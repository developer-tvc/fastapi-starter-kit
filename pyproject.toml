[tool.black]
line-length = 100
target-version = ["py310"]
exclude = '''
/(
    migrations
  | venv
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = ["migrations", "venv", "__pycache__"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true

[tool.pylint.MASTER]
ignore = ["migrations", "venv", "__pycache__"]

[tool.pylint.FORMAT]
max-line-length = 100

[tool.pylint."MESSAGES CONTROL"]
disable = [
  "missing-module-docstring",
  "missing-class-docstring",
  "missing-function-docstring"
]
